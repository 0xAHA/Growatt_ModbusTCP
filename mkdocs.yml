site_name: Growatt Modbus Integration
site_description: Native Home Assistant integration for Growatt solar inverters via direct Modbus TCP/RTU — no cloud required.
site_url: https://0xaha.github.io/Growatt_ModbusTCP/
repo_url: https://github.com/0xAHA/Growatt_ModbusTCP
repo_name: 0xAHA/Growatt_ModbusTCP
edit_uri: edit/main/docs/

theme:
  name: material
  font:
    text: Inter
    code: Roboto Mono
  palette:
    - scheme: default
      primary: light-blue
      accent: light-blue
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: light-blue
      accent: light-blue
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - toc.integrate
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.action.edit
  icon:
    repo: fontawesome/brands/github

plugins:
  - search

nav:
  - Home: index.md
  - Hardware:
    - Supported Models: hardware/models.md
    - Auto-Detection: hardware/autodetection.md
  - Controls:
    - Entity Reference: controls/entity-reference.md
    - Battery & Scheduling: controls/battery-scheduling.md
    - WIT Inverter Guide: controls/wit-guide.md
  - Troubleshooting:
    - Raising an Issue: troubleshooting/raising-an-issue.md
    - Diagnostic Service: troubleshooting/diagnostic-service.md
    - DTC Debugging: troubleshooting/dtc-debugging.md
  - Developer:
    - Adding Sensors: developer/adding-sensors.md
    - New Profile Guide: developer/new-profile.md
    - Protocol Reference:
      - Overview: developer/protocol-database.md
      - Modbus RTU V1.39: developer/protocol-v139.md
      - VPP Protocol: developer/protocol-vpp.md
      - Off-Grid V0.26: developer/protocol-offgrid.md
  - Release Notes: release-notes.md

markdown_extensions:
  - admonition
  - tables
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.details
  - attr_list
  - md_in_html
